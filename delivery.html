<!DOCTYPE html>
<html lang="en-BN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Checkout & Delivery | Berkah Perdana</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, 'Segoe UI', Roboto, sans-serif; background: #f5f7fb; color: #1a2c3e; line-height: 1.5; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
.card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
.card-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; color: #6b1d2e; border-left: 4px solid #c6a43f; padding-left: 12px; }
.cart-item { display: flex; gap: 16px; padding: 16px 0; border-bottom: 1px solid #e2e8f0; align-items: center; flex-wrap: wrap; }
.cart-item-img { width: 70px; height: 70px; object-fit: cover; border-radius: 12px; }
.cart-qty-btn { background: #6b1d2e; color: white; border: none; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; }
.cart-total { font-size: 1.3rem; font-weight: bold; text-align: right; margin-top: 20px; padding-top: 16px; border-top: 2px solid #c6a43f; }
input, select { width: 100%; padding: 12px 16px; margin: 8px 0 16px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 1rem; }
.payment-option { display: flex; gap: 16px; margin: 16px 0; flex-wrap: wrap; }
.payment-option label { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 12px 24px; border: 2px solid #e2e8f0; border-radius: 40px; }
input[type="radio"] { accent-color: #6b1d2e; }
.btn { padding: 14px 28px; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 1rem; }
.btn-primary { background: #6b1d2e; color: white; }
.btn-secondary { background: #e2e8f0; color: #6b1d2e; }
.btn-group { display: flex; gap: 16px; justify-content: space-between; margin-top: 24px; flex-wrap: wrap; }
.watermark-note { background: #fef3c7; border-left: 4px solid #f59e0b; padding: 14px 16px; border-radius: 12px; font-size: 0.8rem; color: #92400e; }
.empty-cart { text-align: center; padding: 60px; }
.toast { position: fixed; bottom: 20px; right: 20px; background: #6b1d2e; color: white; padding: 12px 24px; border-radius: 40px; transform: translateX(120%); transition: 0.3s; z-index: 1100; }
.toast.show { transform: translateX(0); }
.loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 768px) { .cart-item { flex-direction: column; text-align: center; } .btn-group { flex-direction: column; } .btn { width: 100%; } }
</style>
</head>
<body>
<div class="container">
  <div class="card"><h1 style="color:#6b1d2e">🧾 Checkout & Delivery</h1><p style="color:#c6a43f">Lengkapi data pesanan Anda</p></div>
  <div class="card"><div class="card-title">📦 Ringkasan Pesanan</div><div id="cartItemsContainer"></div><div id="cartTotalContainer" class="cart-total"></div></div>
  <div class="card"><div class="card-title">👤 Informasi Penerima</div><input type="text" id="customerName" placeholder="Nama Lengkap (min 3 karakter)"><input type="email" id="customerEmail" placeholder="Email Aktif"><div id="emailError" style="color:#dc2626;font-size:0.75rem;display:none">Email tidak valid</div></div>
  <div class="card"><div class="card-title">💳 Metode Pembayaran</div><div class="payment-option"><label><input type="radio" name="payment" value="Bank Transfer" checked> 🏦 Bank Transfer</label><label><input type="radio" name="payment" value="E-Wallet"> 📱 E-Wallet</label></div><div class="watermark-note">⚠️ <strong>Verification Required - INVALID</strong><br>Invoice ini belum sah. Upload file .txt ke halaman Public Invoice untuk verifikasi.</div></div>
  <div class="btn-group"><button class="btn btn-secondary" id="backToShopBtn">← Kembali ke Toko</button><button class="btn btn-primary" id="generateInvoiceBtn">📄 Generate Invoice (Offline)</button></div>
</div>
<div id="toast" class="toast"></div>
<script>
let cart = JSON.parse(localStorage.getItem('voidsync_cart') || '[]');
function showToast(msg, isError = false) { const t = document.getElementById('toast'); t.textContent = msg; t.style.background = isError ? '#dc2626' : '#6b1d2e'; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
function escapeHtml(str) { return String(str || '').replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]); }
function validateEmail(e) { return /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/.test(e); }
function renderCart() {
  const container = document.getElementById('cartItemsContainer'), totalContainer = document.getElementById('cartTotalContainer');
  if (!cart.length) { container.innerHTML = '<div class="empty-cart">🛒 Keranjang kosong. <a href="index.html">Belanja sekarang</a></div>'; totalContainer.innerHTML = ''; return; }
  let html = '', total = 0;
  cart.forEach((item, idx) => { const itemTotal = (item.price || 0) * (item.quantity || 1); total += itemTotal; html += `<div class="cart-item"><img class="cart-item-img" src="${escapeHtml(item.imageUrl || 'https://placehold.co/70x70?text=No+Img')}"><div><strong>${escapeHtml(item.code)}</strong><br>${escapeHtml((item.name || '').substring(0, 40))}<br>BND ${(item.price || 0).toFixed(2)}</div><div><button class="cart-qty-btn" data-idx="${idx}" data-delta="-1">-</button><span style="margin:0 10px">${item.quantity || 1}</span><button class="cart-qty-btn" data-idx="${idx}" data-delta="1">+</button><button style="background:#ef4444;margin-left:10px;border:none;color:white;padding:4px 12px;border-radius:8px;cursor:pointer" onclick="removeFromCart(${idx})">Hapus</button></div></div>`; });
  container.innerHTML = html; totalContainer.innerHTML = `Total: BND ${total.toFixed(2)}`;
  document.querySelectorAll('.cart-qty-btn').forEach(btn => { btn.addEventListener('click', () => { const idx = parseInt(btn.dataset.idx), delta = parseInt(btn.dataset.delta); let newQty = (cart[idx].quantity || 1) + delta; if (newQty < 1) newQty = 1; cart[idx].quantity = newQty; localStorage.setItem('voidsync_cart', JSON.stringify(cart)); renderCart(); showToast(`Quantity updated`); }); });
}
function removeFromCart(idx) { cart.splice(idx, 1); localStorage.setItem('voidsync_cart', JSON.stringify(cart)); renderCart(); updateGenerateButton(); }
function updateGenerateButton() { const btn = document.getElementById('generateInvoiceBtn'); if (!cart.length) { btn.disabled = true; btn.style.opacity = '0.5'; } else { btn.disabled = false; btn.style.opacity = '1'; } }
async function generateInvoice() {
  const name = document.getElementById('customerName').value.trim(), email = document.getElementById('customerEmail').value.trim(), paymentMethod = document.querySelector('input[name="payment"]:checked')?.value || 'Bank Transfer';
  if (!name || name.length < 3) { showToast('❌ Nama minimal 3 karakter', true); return; }
  if (!email) { showToast('❌ Email wajib diisi', true); return; }
  if (!validateEmail(email)) { document.getElementById('emailError').style.display = 'block'; showToast('❌ Format email tidak valid', true); return; }
  document.getElementById('emailError').style.display = 'none';
  if (!cart.length) { showToast('❌ Keranjang kosong', true); return; }
  const btn = document.getElementById('generateInvoiceBtn'), originalHtml = btn.innerHTML;
  btn.innerHTML = '<span class="loading-spinner"></span> Generating...'; btn.disabled = true;
  try {
    const invoiceId = 'INV-' + Date.now() + '-' + Math.floor(Math.random() * 10000), now = new Date();
    let offlineInvoices = JSON.parse(localStorage.getItem('berkah_invoices_offline') || '[]');
    offlineInvoices.push({ id: invoiceId, date: now.toISOString(), customer: { name, email }, paymentMethod, status: 'pending', items: cart.map(item => ({ code: item.code, name: item.name, price: item.price, quantity: item.quantity || 1 })), total: cart.reduce((s, i) => s + (i.price || 0) * (i.quantity || 1), 0) });
    localStorage.setItem('berkah_invoices_offline', JSON.stringify(offlineInvoices));
    let total = cart.reduce((s, i) => s + (i.price || 0) * (i.quantity || 1), 0);
    let content = `========================================\nBERKAH PERDANA ENTERPRISE\nOFFICIAL INVOICE\n========================================\n\n⚠️⚠️⚠️ VERIFICATION REQUIRED - INVALID ⚠️⚠️⚠️\nInvoice ini TIDAK SAH sebelum diverifikasi.\n\nInvoice ID: ${invoiceId}\nDate: ${now.toLocaleString()}\nPayment: ${paymentMethod}\n\nCustomer: ${name} (${email})\n\nItems:\n`;
    cart.forEach(item => { const qty = item.quantity || 1, price = item.price || 0; content += `- ${item.code} | ${item.name}\n  BND ${price.toFixed(2)} x ${qty} = BND ${(price * qty).toFixed(2)}\n`; });
    content += `\nTOTAL: BND ${total.toFixed(2)}\n\n⚠️ VERIFICATION REQUIRED - INVALID ⚠️\nContact: +6738363366\nEmail: official@berkahperdana.com\n========================================`;
    const blob = new Blob([content], { type: 'text/plain' }), a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `invoice_${invoiceId}.txt`; a.click(); URL.revokeObjectURL(a.href);
    cart = []; localStorage.setItem('voidsync_cart', JSON.stringify(cart)); renderCart(); updateGenerateButton();
    document.getElementById('customerName').value = ''; document.getElementById('customerEmail').value = '';
    showToast('✅ Invoice generated! File telah di-download.');
  } finally { btn.innerHTML = originalHtml; btn.disabled = false; }
}
document.getElementById('generateInvoiceBtn').onclick = generateInvoice;
document.getElementById('backToShopBtn').onclick = () => window.location.href = 'index.html';
renderCart(); updateGenerateButton();
setInterval(() => { const newCart = JSON.parse(localStorage.getItem('voidsync_cart') || '[]'); if (JSON.stringify(newCart) !== JSON.stringify(cart)) { cart = newCart; renderCart(); updateGenerateButton(); } }, 1000);
window.removeFromCart = removeFromCart;
</script>
</body>
</html>
