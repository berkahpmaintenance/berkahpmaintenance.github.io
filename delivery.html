<!DOCTYPE html>
<html lang="en-BN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes">
<title>Checkout & Delivery | Berkah Perdana</title>
<!-- BERKAH:STYLE:START -->
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,'Segoe UI',Roboto,sans-serif;background:#f5f7fb;color:#1a2c3e;line-height:1.5;padding:20px;min-height:100vh}:root{--maroon:#6b1d2e;--maroon-dark:#4e1522;--gold:#c6a43f;--white:#fff;--border:#e2e8f0}.container{max-width:1200px;margin:0 auto}.card{background:white;border-radius:20px;padding:24px;margin-bottom:24px;box-shadow:0 2px 8px rgba(0,0,0,0.05);border:1px solid var(--border)}.card-title{font-size:1.2rem;font-weight:600;margin-bottom:20px;color:var(--maroon);border-left:4px solid var(--gold);padding-left:12px}.cart-item{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid var(--border);align-items:center;flex-wrap:wrap}.cart-item-img{width:70px;height:70px;object-fit:cover;border-radius:12px;background:#f0f0f0}.cart-item-info{flex:1;min-width:150px}.cart-item-price{font-weight:bold;color:var(--maroon)}.cart-qty-btn{background:var(--maroon);color:white;border:none;width:32px;height:32px;border-radius:8px;cursor:pointer;font-weight:bold;font-size:1rem}.cart-qty-btn:hover{background:var(--maroon-dark)}.cart-qty{margin:0 12px;font-weight:bold}.cart-total{font-size:1.3rem;font-weight:bold;text-align:right;margin-top:20px;padding-top:16px;border-top:2px solid var(--gold)}input,select{width:100%;padding:12px 16px;margin:8px 0 16px;border:1px solid var(--border);border-radius:12px;font-size:1rem;font-family:inherit}input:focus,select:focus{outline:none;border-color:var(--maroon);box-shadow:0 0 0 3px rgba(107,29,46,0.1)}.payment-group{margin:16px 0}.payment-option{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap}.payment-option label{display:flex;align-items:center;gap:10px;cursor:pointer;padding:12px 24px;border:2px solid var(--border);border-radius:40px;transition:all .2s;font-weight:500}input[type="radio"]{width:auto;margin:0;accent-color:var(--maroon)}input[type="radio"]:checked+label,.payment-option label:has(input:checked){border-color:var(--gold);background:var(--maroon);color:white}.btn{padding:14px 28px;border:none;border-radius:40px;font-weight:bold;cursor:pointer;font-size:1rem;transition:all .2s;font-family:inherit}.btn-primary{background:var(--maroon);color:white}.btn-primary:hover{background:var(--maroon-dark);transform:translateY(-2px)}.btn-secondary{background:#e2e8f0;color:var(--maroon)}.btn-group{display:flex;gap:16px;justify-content:space-between;margin-top:24px;flex-wrap:wrap}.watermark-note{background:#fef3c7;border-left:4px solid #f59e0b;padding:14px 16px;margin:16px 0 0;border-radius:12px;font-size:.8rem;color:#92400e}.empty-cart{text-align:center;padding:60px 20px;color:#6c757d}.empty-cart a{color:var(--maroon);text-decoration:none;font-weight:bold}.toast{position:fixed;bottom:20px;right:20px;background:var(--maroon);color:white;padding:12px 24px;border-radius:40px;transform:translateX(120%);transition:.3s;z-index:1100;font-size:.85rem}.toast.show{transform:translateX(0)}.loading-spinner{display:inline-block;width:20px;height:20px;border:2px solid white;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:768px){body{padding:12px}.cart-item{flex-direction:column;text-align:center}.cart-item-info{text-align:center}.btn-group{flex-direction:column}.btn{width:100%}.payment-option{justify-content:center}.cart-total{text-align:center}}@media(max-width:480px){.card{padding:16px}.payment-option label{padding:8px 16px;font-size:.85rem}}</style>
<!-- BERKAH:STYLE:END -->
</head>
<body>
<div class="container"><div class="card"><h1 style="color:var(--maroon)">🧾 Checkout & Delivery</h1><p style="color:var(--gold)">Lengkapi data pesanan Anda</p></div>
<div class="card"><div class="card-title">📦 Ringkasan Pesanan</div><div id="cartItemsContainer"></div><div id="cartTotalContainer" class="cart-total"></div></div>
<div class="card"><div class="card-title">👤 Informasi Penerima</div><input type="text" id="customerName" placeholder="Nama Lengkap (min 3 karakter)" autocomplete="name"><input type="email" id="customerEmail" placeholder="Email Aktif" autocomplete="email"><div id="emailError" style="color:#dc2626;font-size:.75rem;margin-top:-12px;margin-bottom:8px;display:none">Email tidak valid</div></div>
<div class="card"><div class="card-title">💳 Metode Pembayaran</div><div class="payment-group"><div class="payment-option"><label><input type="radio" name="payment" value="Bank Transfer" checked> 🏦 Bank Transfer (BCA/BNI/Mandiri)</label><label><input type="radio" name="payment" value="E-Wallet"> 📱 E-Wallet (Dana/OVO/GoPay)</label></div></div><div class="watermark-note">⚠️ <strong>Verification Required - INVALID</strong><br>Invoice ini belum sah. Upload file .txt ke halaman Public Invoice untuk verifikasi.</div></div>
<div class="btn-group"><button class="btn btn-secondary" id="backToShopBtn">← Kembali ke Toko</button><button class="btn btn-primary" id="generateInvoiceBtn">📄 Generate Invoice (Offline)</button></div></div>
<div id="toast" class="toast"></div>
<!-- BERKAH:SCRIPT:START -->
<script>(function(){let cart=JSON.parse(localStorage.getItem('voidsync_cart')||'[]');function showToast(e,t=!1){const o=document.getElementById('toast');o.textContent=e,o.style.background=t?'#dc2626':'#6b1d2e',o.classList.add('show'),setTimeout(()=>o.classList.remove('show'),3e3)}function escapeHtml(e){return String(e||'').replace(/[&<>]/g,(e=>'&'===e?'&amp;':'<'===e?'&lt;':'&gt;'===e?'&gt;':e))}function validateEmail(e){return/^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/.test(e)}function renderCart(){const e=document.getElementById('cartItemsContainer'),t=document.getElementById('cartTotalContainer');if(!cart.length){e.innerHTML='<div class="empty-cart">🛒 Keranjang kosong. <a href="index.html">Belanja sekarang</a></div>',t.innerHTML='';return}let o='',n=0;cart.forEach(((e,t)=>{const l=(e.price||0)*(e.quantity||1);n+=l,o+=`<div class="cart-item" data-idx="${t}"><img class="cart-item-img" src="${escapeHtml(e.imageUrl||'https://placehold.co/70x70?text=No+Img')}" onerror="this.src='https://placehold.co/70x70?text=No+Img'"><div class="cart-item-info"><div><strong>${escapeHtml(e.code)}</strong></div><div>${escapeHtml((e.name||'').substring(0,60))}</div></div><div class="cart-item-price">BND ${(e.price||0).toFixed(2)}</div><div><button class="cart-qty-btn minus-btn" data-idx="${t}" data-delta="-1">−</button><span class="cart-qty">${e.quantity||1}</span><button class="cart-qty-btn plus-btn" data-idx="${t}" data-delta="1">+</button></div><button class="cart-qty-btn" style="background:#ef4444" data-idx="${t}" data-remove="true">🗑</button></div>`})),e.innerHTML=o,t.innerHTML=`Total: BND ${n.toFixed(2)}`,document.querySelectorAll('.minus-btn,.plus-btn').forEach((e=>{e.addEventListener('click',(()=>{const t=parseInt(e.dataset.idx),o=parseInt(e.dataset.delta);let n=(cart[t].quantity||1)+o;n<1&&(n=1),cart[t].quantity=n,localStorage.setItem('voidsync_cart',JSON.stringify(cart)),renderCart(),showToast(`Quantity updated: ${cart[t].name}`)}))})),document.querySelectorAll('[data-remove="true"]').forEach((e=>{e.addEventListener('click',(()=>{const t=parseInt(e.dataset.idx);cart.splice(t,1),localStorage.setItem('voidsync_cart',JSON.stringify(cart)),renderCart(),showToast('Item dihapus dari keranjang'),updateGenerateButton()}))}))}function updateGenerateButton(){const e=document.getElementById('generateInvoiceBtn');cart.length?(e.disabled=!1,e.style.opacity='1',e.style.cursor='pointer'):(e.disabled=!0,e.style.opacity='0.5',e.style.cursor='not-allowed')}async function generateInvoice(){const e=document.getElementById('customerName').value.trim(),t=document.getElementById('customerEmail').value.trim(),o=document.querySelector('input[name="payment"]:checked')?.value||'Bank Transfer',n=document.getElementById('emailError');if(!e||e.length<3){showToast('❌ Nama minimal 3 karakter',!0);return}if(!t){showToast('❌ Email wajib diisi',!0);return}if(!validateEmail(t)){n&&(n.style.display='block'),showToast('❌ Format email tidak valid',!0);return}n&&(n.style.display='none');if(!cart.length){showToast('❌ Keranjang kosong',!0);return}const l=document.getElementById('generateInvoiceBtn'),c=l.innerHTML;l.innerHTML='<span class="loading-spinner"></span> Generating...',l.disabled=!0;try{const n='INV-'+Date.now()+'-'+Math.floor(1e4*Math.random()),i=new Date,d={id:n,date:i.toISOString(),customer:{name:e,email:t},paymentMethod:o,status:'pending',items:cart.map((e=>({code:e.code,name:e.name,price:e.price,quantity:e.quantity||1}))),total:cart.reduce(((e,t)=>e+(t.price||0)*(t.quantity||1)),0)};let a=JSON.parse(localStorage.getItem('berkah_invoices_offline')||'[]');a.push(d),localStorage.setItem('berkah_invoices_offline',JSON.stringify(a));let s=`========================================\n    BERKAH PERDANA ENTERPRISE\n    OFFICIAL INVOICE\n========================================\n\n⚠️⚠️⚠️ VERIFICATION REQUIRED - INVALID ⚠️⚠️⚠️\nInvoice ini TIDAK SAH sebelum diverifikasi.\nUpload file ini ke halaman Public Invoice.\n\nInvoice ID: ${n}\nDate: ${i.toLocaleString()}\nPayment Method: ${o}\n\nCustomer:\n  Name: ${e}\n  Email: ${t}\n\nItems:\n`;cart.forEach((e=>{const t=e.quantity||1,o=e.price||0;s+=`  - ${e.code} | ${e.name}\n    Price: BND ${o.toFixed(2)} x ${t} = BND ${(o*t).toFixed(2)}\n`}));const u=cart.reduce(((e,t)=>e+(t.price||0)*(t.quantity||1)),0);s+=`\n----------------------------------------\nTOTAL: BND ${u.toFixed(2)}\n----------------------------------------\n\n⚠️⚠️⚠️ VERIFICATION REQUIRED - INVALID ⚠️⚠️⚠️\nThis is NOT a valid proof of payment.\n\nContact: +6738363366\nEmail: official@berkahperdana.com\n\nThank you for shopping at Berkah Perdana!\n========================================`;const r=new Blob([s],{type:'text/plain'}),p=document.createElement('a');p.href=URL.createObjectURL(r),p.download=`invoice_${n}.txt`,p.click(),URL.revokeObjectURL(p.href),cart=[],localStorage.setItem('voidsync_cart',JSON.stringify(cart)),renderCart(),updateGenerateButton(),document.getElementById('customerName').value='',document.getElementById('customerEmail').value='',showToast('✅ Invoice generated! File telah di-download.')}finally{l.innerHTML=c,l.disabled=!1}}document.getElementById('generateInvoiceBtn').onclick=generateInvoice,document.getElementById('backToShopBtn').onclick=()=>{window.location.href='index.html'},renderCart(),updateGenerateButton(),setInterval((()=>{const e=JSON.parse(localStorage.getItem('voidsync_cart')||'[]');JSON.stringify(e)!==JSON.stringify(cart)&&(cart=e,renderCart(),updateGenerateButton())}),1e3)})();</script>
<!-- BERKAH:SCRIPT:END -->
</body>
</html>
